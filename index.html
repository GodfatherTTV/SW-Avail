<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Citizen Org Availability | SW-AVAIL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js",
    "firebase/database": "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js"
  }
}
</script>
<style>
  :root {
    --bg: #020509;
    --panel: #0a1018;
    --panel-2: #0e1620;
    --cyan: #00e5ff;
    --cyan-dim: #00b8d4;
    --blue: #2979ff;
    --text: #c8e7ff;
    --text-dim: #7aa3c4;
    --border: rgba(0, 229, 255, 0.25);
    --danger: #ff4455;
    --ok: #00e676;
    --grid: rgba(0, 229, 255, 0.08);
    --shadow: 0 8px 32px rgba(0, 229, 255, 0.12);
  }
    * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Rajdhani', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(circle at 15% 50%, rgba(0, 229, 255, 0.08) 0%, transparent 50%),
      radial-gradient(circle at 85% 30%, rgba(41, 121, 255, 0.08) 0%, transparent 50%),
      linear-gradient(180deg, var(--bg) 0%, #000308 100%);
  }
 .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
  header {
    background: linear-gradient(135deg, var(--panel) 0%, var(--panel-2) 100%);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    margin-bottom: 24px;
    box-shadow: var(--shadow), inset 0 1px 0 rgba(0, 229, 255, 0.1);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    animation: scanline 3s linear infinite;
  }
  @keyframes scanline { to { left: 100%; } }
  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 3px;
    color: var(--cyan);
    text-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
    margin-bottom: 4px;
  }
 .subtitle { color: var(--text-dim); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
 .connection-status {
    position: absolute;
    top: 20px;
    right: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: rgba(0, 0, 0, 0.4);
  }
 .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 8px currentColor; animation: pulse 2s ease-in-out infinite; }
 .status-dot.connected { background: var(--ok); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
 .layout { display: grid; grid-template-columns: 320px 1fr; gap: 24px; align-items: start; }
  @media (max-width: 1024px) {.layout { grid-template-columns: 1fr; } }
 .panel {
    background: linear-gradient(135deg, var(--panel) 0%, var(--panel-2) 100%);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    box-shadow: var(--shadow);
    position: relative;
  }
 .panel-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
 .panel-title::before { content: '▶'; font-size: 10px; color: var(--cyan-dim); }
 .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 6px; }
  input[type="text"], select {
    width: 100%;
    padding: 10px 12px;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    transition: all 0.2s;
  }
  input[type="text"]:focus, select:focus {
    outline: none;
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.1), inset 0 0 20px rgba(0, 229, 255, 0.05);
  }
 .roles-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
 .role-checkbox {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 13px;
  }
 .role-checkbox:hover { border-color: var(--cyan-dim); background: rgba(0, 229, 255, 0.05); }
 .role-checkbox input[type="checkbox"] { accent-color: var(--cyan); cursor: pointer; }
 .btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, var(--cyan-dim) 0%, var(--blue) 100%);
    border: none;
    border-radius: 4px;
    color: var(--bg);
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(0, 229, 255, 0.3);
  }
 .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0, 229, 255, 0.5); }
 .btn:active { transform: translateY(0); }
 .btn-secondary {
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid var(--border);
    color: var(--text);
    box-shadow: none;
    margin-top: 8px;
  }
 .btn-secondary:hover { background: rgba(0, 229, 255, 0.1); border-color: var(--cyan); }
 .member-select { margin-bottom: 16px; }
 .current-member {
    padding: 12px;
    background: rgba(0, 229, 255, 0.08);
    border: 1px solid var(--cyan);
    border-radius: 4px;
    font-size: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
 .filters { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
 .filter-group { margin-bottom: 12px; }
 .calendar-wrapper { overflow-x: auto; padding: 4px; }
 .calendar-grid {
    display: grid;
    grid-template-columns: 80px repeat(12, 1fr);
    gap: 2px;
    min-width: 900px;
  }
 .grid-header {
    background: var(--panel-2);
    border: 1px solid var(--border);
    padding: 12px 8px;
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--cyan);
  }
 .grid-header.time { position: sticky; left: 0; z-index: 2; background: var(--panel); }
 .day-label {
    background: var(--panel-2);
    border: 1px solid var(--border);
    padding: 12px 8px;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: sticky;
    left: 0;
    z-index: 1;
  }
 .slot {
    aspect-ratio: 1.2;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid var(--grid);
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    user-select: none;
  }
 .slot:hover { border-color: var(--cyan); box-shadow: inset 0 0 20px rgba(0, 229, 255, 0.2); z-index: 10; transform: scale(1.05); }
 .slot.editable:active { transform: scale(0.95); }
 .slot.heat-0 { background: rgba(0, 0, 0, 0.4); }
 .slot.heat-1 { background: rgba(0, 229, 255, 0.15); border-color: rgba(0, 229, 255, 0.3); }
 .slot.heat-2 { background: rgba(0, 229, 255, 0.3); border-color: rgba(0, 229, 255, 0.5); }
 .slot.heat-3 { background: rgba(0, 229, 255, 0.5); border-color: rgba(0, 229, 255, 0.7); }
 .slot.heat-4 { background: rgba(0, 229, 255, 0.7); border-color: var(--cyan); box-shadow: 0 0 12px rgba(0, 229, 255, 0.4); }
 .slot.heat-5 { background: rgba(0, 229, 255, 0.85); border-color: var(--cyan); box-shadow: 0 0 16px rgba(0, 229, 255, 0.6); }
 .slot.selected {
    background: linear-gradient(135deg, var(--cyan) 0%, var(--blue) 100%)!important;
    border-color: var(--cyan)!important;
    box-shadow: 0 0 20px rgba(0, 229, 255, 0.8), inset 0 0 10px rgba(255, 255, 255, 0.3)!important;
  }
 .tooltip {
    position: fixed;
    background: var(--panel);
    border: 1px solid var(--cyan);
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 1000;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 229, 255, 0.3);
    max-width: 250px;
  }
 .tooltip.visible { opacity: 1; }
 .tooltip-title { color: var(--cyan); font-weight: 700; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
 .tooltip-list { color: var(--text-dim); line-height: 1.6; }
 .legend { display: flex; gap: 16px; align-items: center; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); font-size: 11px; }
 .legend-item { display: flex; align-items: center; gap: 6px; }
 .legend-box { width: 20px; height: 20px; border: 1px solid var(--grid); border-radius: 2px; }
 .members-list { margin-top: 20px; max-height: 300px; overflow-y: auto; }
 .member-item {
    padding: 10px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 8px;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
 .member-item:hover { border-color: var(--cyan-dim); background: rgba(0, 229, 255, 0.05); }
 .member-roles { font-size: 10px; color: var(--text-dim); margin-top: 4px; }
 .delete-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 16px; padding: 4px; opacity: 0.6; transition: opacity 0.2s; }
 .delete-btn:hover { opacity: 1; }
 .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
 .stat-card { background: rgba(0, 0, 0, 0.4); border: 1px solid var(--border); border-radius: 4px; padding: 12px; text-align: center; }
 .stat-value { font-size: 24px; font-weight: 700; color: var(--cyan); font-family: 'Orbitron', sans-serif; }
 .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-top: 4px; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--cyan-dim); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>SW-AVAIL</h1>
    <div class="subtitle">Star Citizen Org Availability Grid</div>
    <div class="connection-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </header>

  <div class="layout">
    <aside class="panel">
      <div class="panel-title">Member Control</div>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-value" id="statMembers">0</div>
          <div class="stat-label">Members</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statSlots">0</div>
          <div class="stat-label">Slots</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statPeak">0</div>
          <div class="stat-label">Peak</div>
        </div>
      </div>

      <div class="member-select">
        <label>Active Member</label>
        <select id="memberSelect">
          <option value="">-- Select Member --</option>
        </select>
        <div class="current-member" id="currentMember" style="display:none;">
          <span id="currentMemberName"></span>
          <button class="delete-btn" id="clearSelection" title="Clear Selection">✕</button>
        </div>
      </div>

      <form id="addMemberForm">
        <div class="form-group">
          <label>Callsign</label>
          <input type="text" id="callsign" placeholder="Enter SC Handle" required>
        </div>

        <div class="form-group">
          <label>Timezone</label>
          <select id="timezone">
            <option value="America/New_York">EST / EDT</option>
            <option value="America/Chicago">CST / CDT</option>
            <option value="America/Denver">MST / MDT</option>
            <option value="America/Los_Angeles">PST / PDT</option>
            <option value="UTC">UTC</option>
            <option value="Europe/London">GMT / BST</option>
            <option value="Europe/Berlin">CET / CEST</option>
            <option value="Asia/Tokyo">JST</option>
            <option value="Australia/Sydney">AEST / AEDT</option>
          </select>
        </div>

        <div class="form-group">
          <label>Primary Roles</label>
          <div class="roles-grid">
            <label class="role-checkbox"><input type="checkbox" value="Pilot"> Pilot</label>
            <label class="role-checkbox"><input type="checkbox" value="Gunner"> Gunner</label>
            <label class="role-checkbox"><input type="checkbox" value="Engineer"> Engineer</label>
            <label class="role-checkbox"><input type="checkbox" value="FPS"> FPS</label>
            <label class="role-checkbox"><input type="checkbox" value="Salvage"> Salvage</label>
            <label class="role-checkbox"><input type="checkbox" value="Medical"> Medical</label>
            <label class="role-checkbox"><input type="checkbox" value="Support"> Support</label>
          </div>
        </div>

        <button type="submit" class="btn">Add Member</button>
        <button type="button" class="btn btn-secondary" id="clearAllBtn">Clear All Slots</button>
      </form>

      <div class="filters">
        <div class="panel-title">Filters</div>

        <div class="filter-group">
          <label>Search Callsign</label>
          <input type="text" id="searchCallsign" placeholder="Filter by name...">
        </div>

        <div class="filter-group">
          <label>Filter by Role</label>
          <select id="roleFilter">
            <option value="">All Roles</option>
            <option value="Pilot">Pilot</option>
            <option value="Gunner">Gunner</option>
            <option value="Engineer">Engineer</option>
            <option value="FPS">FPS</option>
            <option value="Salvage">Salvage</option>
            <option value="Medical">Medical</option>
            <option value="Support">Support</option>
          </select>
        </div>
      </div>

      <div class="members-list" id="membersList"></div>

      <div class="filters">
        <div class="panel-title">Admin</div>
        <button type="button" class="btn btn-secondary" id="migrateBtn">Migrate Legacy Data</button>
        <div id="migrateStatus" style="font-size:11px; color:var(--text-dim); margin-top:8px;"></div>
      </div>
    </aside>

    <main class="panel">
      <div class="panel-title">Global Availability Heatmap</div>
      <div class="calendar-wrapper">
        <div class="calendar-grid" id="calendarGrid"></div>
      </div>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-box heat-0"></div>
          <span>0</span>
        </div>
        <div class="legend-item">
          <div class="legend-box heat-1"></div>
          <span>1-2</span>
        </div>
        <div class="legend-item">
          <div class="legend-box heat-2"></div>
          <span>3-4</span>
        </div>
        <div class="legend-item">
          <div class="legend-box heat-3"></div>
          <span>5-7</span>
        </div>
        <div class="legend-item">
          <div class="legend-box heat-4"></div>
          <span>8-10</span>
        </div>
        <div class="legend-item">
          <div class="legend-box heat-5"></div>
          <span>11+</span>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script type="module">
  import { initializeApp } from 'firebase/app';
  import { getDatabase, ref, onValue, remove, set, get, update } from 'firebase/database';

  const firebaseConfig = {
    apiKey: "AIzaSyDhllHPfEqOrvlpe1i31-2sTbLsUVWdADk",
    authDomain: "sw-avail.firebaseapp.com",
    projectId: "sw-avail",
    storageBucket: "sw-avail.firebasestorage.app",
    messagingSenderId: "581229265106",
    appId: "1:581229265106:web:4f6138db2fa4fcba6aad0b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const VIEWER_TZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const HOURS = Array.from({length: 12}, (_, i) => i * 2);

  let membersData = {};
  let selectedMember = null;
  let isDragging = false;
  let dragMode = null;
  let searchFilter = '';
  let roleFilter = '';

  function getWeekStart() {
    const now = new Date();
    const day = now.getDay();
    const diff = now.getDate() - day;
    const sunday = new Date(now.setDate(diff));
    sunday.setHours(0, 0, 0, 0);
    return sunday;
  }

  function gridToUTC(dayIdx, hourBlock) {
    const weekStart = getWeekStart();
    const targetDate = new Date(weekStart);
    targetDate.setDate(weekStart.getDate() + dayIdx);
    const year = targetDate.getFullYear();
    const month = String(targetDate.getMonth() + 1).padStart(2, '0');
    const day = String(targetDate.getDate()).padStart(2, '0');
    const hour = String(hourBlock).padStart(2, '0');
    const localStr = `${year}-${month}-${day}T${hour}:00:00`;
    const localDate = new Date(localStr);
    return new Date(localDate.getTime() - (localDate.getTimezoneOffset() * 60000)).toISOString();
  }

  document.addEventListener('DOMContentLoaded', () => {
    buildGrid();
    initFirebase();
    attachEventListeners();
    const tzSelect = document.getElementById('timezone');
    if (tzSelect && tzSelect.querySelector(`option[value="${VIEWER_TZ}"]`)) {
      tzSelect.value = VIEWER_TZ;
    }
  });

  function buildGrid() {
    const grid = document.getElementById('calendarGrid');
    if (!grid) return;
    grid.innerHTML = '';
    const corner = document.createElement('div');
    corner.className = 'grid-header time';
    corner.textContent = 'DAY/TIME';
    grid.appendChild(corner);
    HOURS.forEach(h => {
      const header = document.createElement('div');
      header.className = 'grid-header';
      header.textContent = `${String(h).padStart(2, '0')}:00`;
      grid.appendChild(header);
    });
    DAYS.forEach((day, dayIdx) => {
      const dayLabel = document.createElement('div');
      dayLabel.className = 'day-label';
      dayLabel.textContent = day;
      grid.appendChild(dayLabel);
      HOURS.forEach((hour) => {
        const slot = document.createElement('div');
        slot.className = 'slot';
        slot.dataset.day = day;
        slot.dataset.hour = hour;
        slot.dataset.dayIdx = dayIdx;
        grid.appendChild(slot);
      });
    });
  }

  function initFirebase() {
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    if (!statusDot ||!statusText) return;
    const membersRef = ref(db, 'orgs/sw-avail/members');
    onValue(membersRef, (snapshot) => {
      membersData = snapshot.val() || {};
      statusDot.classList.add('connected');
      statusText.textContent = 'LIVE SYNC';
      updateUI();
    }, (error) => {
      statusDot.classList.remove('connected');
      statusText.textContent = 'OFFLINE';
      console.error('Firebase error:', error);
    });
  }

  function attachEventListeners() {
    const grid = document.getElementById('calendarGrid');
    const tooltip = document.getElementById('tooltip');
    if (!grid ||!tooltip) return;

    grid.addEventListener('mousedown', (e) => {
      if (!e.target.classList.contains('slot') ||!selectedMember) return;
      e.preventDefault();
      isDragging = true;
      const dayIdx = parseInt(e.target.dataset.dayIdx);
      const hour = parseInt(e.target.dataset.hour);
      const utcKey = gridToUTC(dayIdx, hour);
      const currentState = membersData[selectedMember]?.slots?.[utcKey] || false;
      dragMode = currentState? 'remove' : 'add';
      toggleSlot(e.target, dragMode === 'add');
    });

    grid.addEventListener('mouseover', (e) => {
      if (!e.target.classList.contains('slot')) return;
      if (isDragging && selectedMember) {
        toggleSlot(e.target, dragMode === 'add');
      }
      showTooltip(e.target, tooltip);
    });

    grid.addEventListener('mouseout', (e) => {
      if (e.target.classList.contains('slot')) {
        tooltip.classList.remove('visible');
      }
    });

    grid.addEventListener('mousemove', (e) => {
      if (tooltip.classList.contains('visible')) {
        tooltip.style.left = e.clientX + 15 + 'px';
        tooltip.style.top = e.clientY + 15 + 'px';
      }
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
      dragMode = null;
    });

    document.getElementById('addMemberForm')?.addEventListener('submit', handleAddMember);
    document.getElementById('memberSelect')?.addEventListener('change', (e) => {
      selectedMember = e.target.value || null;
      updateCurrentMemberDisplay();
      updateUI();
    });
    document.getElementById('clearSelection')?.addEventListener('click', () => {
      selectedMember = null;
      document.getElementById('memberSelect').value = '';
      updateCurrentMemberDisplay();
      updateUI();
    });
    document.getElementById('clearAllBtn')?.addEventListener('click', () => {
      if (!selectedMember) {
        alert('Select a member first');
        return;
      }
      if (confirm(`Clear all availability slots for ${selectedMember}?`)) {
        remove(ref(db, `orgs/sw-avail/members/${selectedMember}/slots`));
      }
    });
    document.getElementById('searchCallsign')?.addEventListener('input', (e) => {
      searchFilter = e.target.value.toLowerCase();
      updateUI();
    });
    document.getElementById('roleFilter')?.addEventListener('change', (e) => {
      roleFilter = e.target.value;
      updateUI();
    });
    document.getElementById('migrateBtn')?.addEventListener('click', migrateLegacyData);
  }

  async function migrateLegacyData() {
    const status = document.getElementById('migrateStatus');
    const btn = document.getElementById('migrateBtn');
    if (!status ||!btn) return;

    btn.disabled = true;
    status.textContent = 'Scanning for legacy data...';

    try {
      const snapshot = await get(ref(db, 'orgs/sw-avail/members'));
      const members = snapshot.val() || {};
      let totalMigrated = 0;
      let membersProcessed = 0;

      const dayMap = { 'Sun': 0, 'Mon': 1, 'Tue': 2, 'Wed': 3, 'Thu': 4, 'Fri': 5, 'Sat': 6 };
      const weekStart = getWeekStart();

      for (const [callsign, member] of Object.entries(members)) {
        if (!member.slots) continue;

        const updates = {};
        const removals = {};
        let memberMigrated = 0;

        for (const [key, value] of Object.entries(member.slots)) {
          if (key.includes('_') &&!key.includes('T')) {
            const [dayStr, hourStr] = key.split('_');
            const dayIdx = dayMap[dayStr];
            const hour = parseInt(hourStr);

            if (dayIdx!== undefined &&!isNaN(hour)) {
              const targetDate = new Date(weekStart);
              targetDate.setDate(weekStart.getDate() + dayIdx);
              targetDate.setHours(hour, 0, 0, 0);
              const utcKey = new Date(targetDate.getTime() - (targetDate.getTimezoneOffset() * 60000)).toISOString();

              updates[`orgs/sw-avail/members/${callsign}/slots/${utcKey}`] = true;
              removals[`orgs/sw-avail/members/${callsign}/slots/${key}`] = null;
              memberMigrated++;
            }
          }
        }

        if (memberMigrated > 0) {
          await update(ref(db), updates);
          await update(ref(db), removals);
          totalMigrated += memberMigrated;
          membersProcessed++;
        }
      }

      status.textContent = `Done! Migrated ${totalMigrated} slots for ${membersProcessed} members. Refresh to see changes.`;
      btn.disabled = false;
    } catch (error) {
      status.textContent = `Error: ${error.message}`;
      btn.disabled = false;
    }
  }

  function handleAddMember(e) {
    e.preventDefault();
    const callsign = document.getElementById('callsign').value.trim();
    if (!callsign) return;
    const roles = Array.from(document.querySelectorAll('.role-checkbox input:checked')).map(cb => cb.value);
    const timezone = document.getElementById('timezone').value;
    set(ref(db, `orgs/sw-avail/members/${callsign}`), {
      callsign,
      timezone,
      roles,
      slots: membersData[callsign]?.slots || {},
      updated: Date.now()
    });
    e.target.reset();
    document.getElementById('timezone').value = VIEWER_TZ;
    selectedMember = callsign;
    document.getElementById('memberSelect').value = callsign;
    updateCurrentMemberDisplay();
  }

  function toggleSlot(slotEl, shouldAdd) {
    if (!selectedMember ||!slotEl) return;
    const dayIdx = parseInt(slotEl.dataset.dayIdx);
    const hour = parseInt(slotEl.dataset.hour);
    if (isNaN(dayIdx) || isNaN(hour)) return;
    const key = gridToUTC(dayIdx, hour);
    const slotRef = ref(db, `orgs/sw-avail/members/${selectedMember}/slots/${key}`);
    if (shouldAdd) {
      set(slotRef, true);
    } else {
      remove(slotRef);
    }
  }

  function updateUI() {
    updateMemberList();
    updateMemberSelect();
    updateHeatmap();
    updateStats();
    updateCurrentMemberDisplay();
  }

  function updateMemberList() {
    const list = document.getElementById('membersList');
    if (!list) return;
    list.innerHTML = '';
    Object.values(membersData).forEach(member => {
      const item = document.createElement('div');
      item.className = 'member-item';
      item.innerHTML = `
        <div>
          <div><strong>${member.callsign}</strong> [${member.timezone || 'UTC'}]</div>
          <div class="member-roles">${(member.roles || []).join(' • ') || 'No roles'}</div>
        </div>
        <button class="delete-btn" data-callsign="${member.callsign}" title="Delete Member">✕</button>
      `;
      list.appendChild(item);
    });
    list.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const callsign = e.target.dataset.callsign;
        if (confirm(`Delete ${callsign}?`)) {
          remove(ref(db, `orgs/sw-avail/members/${callsign}`));
          if (selectedMember === callsign) {
            selectedMember = null;
            document.getElementById('memberSelect').value = '';
          }
        }
      });
    });
  }

  function updateMemberSelect() {
    const select = document.getElementById('memberSelect');
    if (!select) return;
    const currentVal = select.value;
    select.innerHTML = '<option value="">-- Select Member --</option>';
    Object.keys(membersData).sort().forEach(callsign => {
      const opt = document.createElement('option');
      opt.value = callsign;
      opt.textContent = callsign;
      select.appendChild(opt);
    });
    if (currentVal && membersData[currentVal]) {
      select.value = currentVal;
    }
  }

  function updateCurrentMemberDisplay() {
    const display = document.getElementById('currentMember');
    const name = document.getElementById('currentMemberName');
    if (!display ||!name) return;
    if (selectedMember && membersData[selectedMember]) {
      display.style.display = 'flex';
      name.textContent = `${selectedMember} - EDITING MODE`;
    } else {
      display.style.display = 'none';
    }
  }

  function updateHeatmap() {
    const slots = document.querySelectorAll('.slot');
    const slotMap = new Map();

    Object.values(membersData).forEach(member => {
      if (searchFilter &&!member.callsign.toLowerCase().includes(searchFilter)) return;
      if (roleFilter &&!(member.roles || []).includes(roleFilter)) return;

      if (member.slots) {
        Object.keys(member.slots).forEach(utcKey => {
          try {
            const date = new Date(utcKey);
            if (isNaN(date)) return;
            const day = DAYS[date.getDay()];
            const hour = Math.floor(date.getHours() / 2) * 2;
            const gridKey = `${day}_${hour}`;
            if (!slotMap.has(gridKey)) slotMap.set(gridKey, []);
            slotMap.get(gridKey).push(member.callsign);
          } catch (e) {}
        });
      }
    });

    slots.forEach(slot => {
      const day = slot.dataset.day;
      const hour = slot.dataset.hour;
      if (!day || hour === undefined) return;
      const gridKey = `${day}_${hour}`;
      const availableMembers = slotMap.get(gridKey) || [];
      const count = availableMembers.length;

      slot.className = 'slot';
      if (selectedMember) slot.classList.add('editable');

      if (count === 0) slot.classList.add('heat-0');
      else if (count <= 2) slot.classList.add('heat-1');
      else if (count <= 4) slot.classList.add('heat-2');
      else if (count <= 7) slot.classList.add('heat-3');
      else if (count <= 10) slot.classList.add('heat-4');
      else slot.classList.add('heat-5');

      if (selectedMember && availableMembers.includes(selectedMember)) {
        slot.classList.add('selected');
      }

      slot.dataset.count = count;
      slot.dataset.members = availableMembers.join(', ');
    });
  }

  function showTooltip(slotEl, tooltipEl) {
    if (!slotEl ||!tooltipEl) return;
    const day = slotEl.dataset.day;
    const hour = parseInt(slotEl.dataset.hour);
    const count = parseInt(slotEl.dataset.count || 0);
    const members = slotEl.dataset.members;
    if (!day || isNaN(hour)) return;
    const endHour = hour + 2;
    const timeStr = `${String(hour).padStart(2, '0')}:00-${String(endHour).padStart(2, '0')}:00`;
    tooltipEl.innerHTML = `
      <div class="tooltip-title">${day} ${timeStr}</div>
      <div class="tooltip-list">
        <strong>${count} Member${count!== 1? 's' : ''}</strong><br>
        ${count > 0? members.split(', ').join('<br>') : '<em>No availability</em>'}
      </div>
    `;
    tooltipEl.classList.add('visible');
  }

  function updateStats() {
    const statMembers = document.getElementById('statMembers');
    const statSlots = document.getElementById('statSlots');
    const statPeak = document.getElementById('statPeak');
    if (!statMembers ||!statSlots ||!statPeak) return;
    const memberCount = Object.keys(membersData).length;
    let totalSlots = 0;
    let peakCount = 0;
    const heatmap = {};
    Object.values(membersData).forEach(member => {
      if (member.slots) {
        Object.keys(member.slots).forEach(slotKey => {
          totalSlots++;
          heatmap[slotKey] = (heatmap[slotKey] || 0) + 1;
          if (heatmap[slotKey] > peakCount) peakCount = heatmap[slotKey];
        });
      }
    });
    statMembers.textContent = memberCount;
    statSlots.textContent = totalSlots;
    statPeak.textContent = peakCount;
  }
</script>
</body>
</html>
